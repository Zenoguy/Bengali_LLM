```
steps:
  - name: Warm up Hugging Face /generate endpoint
    run: |
      echo "🚀 Starting HF model warm-up..."

      URL="https://sam-veda-bengali-llm-space.hf.space/generate"

      PAYLOAD='{
        "prompt": "hi",
        "system_prompt": "You are a helpful assistant.",
        "max_new_tokens": 1,
        "temperature": 0.7,
        "top_p": 0.9
      }'

      success=false

      # small delay to allow HF container spin-up
      sleep 5

      for i in 1 2 3; do
        echo "🔁 Attempt $i..."

        START_TIME=$(date +%s)

        HTTP_STATUS=$(curl --max-time 90 -s -o /dev/null -w "%{http_code}" \
          -L \
          -X POST "$URL" \
          -H "Content-Type: application/json" \
          -H "User-Agent: Mozilla/5.0" \
          -d "$PAYLOAD")

        END_TIME=$(date +%s)
        DURATION=$((END_TIME - START_TIME))

        echo "📡 Status: $HTTP_STATUS | ⏱ Took: ${DURATION}s"

        if [ "$HTTP_STATUS" = "200" ]; then
          echo "✅ Model warm-up successful"
          success=true
          break

        elif [ "$HTTP_STATUS" = "503" ] || [ "$HTTP_STATUS" = "429" ] || [ "$HTTP_STATUS" = "524" ]; then
          echo "⚠️ Space is waking up or rate-limited. Waiting..."
          sleep 25

        else
          echo "⚠️ Unexpected status ($HTTP_STATUS). Retrying..."
          sleep 15
        fi
      done

      if [ "$success" = false ]; then
        echo "❌ Warm-up failed after all attempts."
        echo "💡 This likely means model is still loading or HF infra delay."
        exit 0
      fi

      echo "🔥 Warm-up cycle complete."
